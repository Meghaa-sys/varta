services:
  - type: web
    name: varta-api
    runtime: node
    rootDir: backend
    plan: free
    region: singapore

    buildCommand: npm install && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start

    healthCheckPath: /health
    autoDeployTrigger: commit

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 7d

      - key: CLIENT_URL
        value: https://varta-web.onrender.com

      - key: GEMINI_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-flash-latest

      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: MAX_FILE_SIZE_MB
        value: 15

      - key: MAX_FILES_PER_MESSAGE
        value: 5

  - type: web
    name: varta-web
    runtime: static
    rootDir: frontend

    buildCommand: npm install && npm run build
    staticPublishPath: dist

    autoDeployTrigger: commit

    envVars:
      - key: VITE_API_URL
        value: https://varta-api.onrender.com/api

      - key: VITE_SOCKET_URL
        value: https://varta-api.onrender.com

    routes:
      - type: rewrite
        source: /*
        destination: /index.html